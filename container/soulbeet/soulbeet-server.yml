services:
  soulbeet:
    image: docker.io/docccccc/soulbeet:latest
    network_mode: host
    restart: unless-stopped
    ports:
      - 9765:9765
    environment:
      - DATABASE_URL=sqlite:/data/soulbeet.db
      - DOWNLOAD_PATH=/downloads
      - NAVIDROME_URL=http://xiserver.slugcat.net:4533
    volumes:
      - ./data:/data
      - /mnt/data/slskd/downloads:/downloads
      - /mnt/data/music:/music
    depends_on:
      - slskd

  slskd:
    image: slskd/slskd
    network_mode: host
    environment:
      - SLSKD_REMOTE_CONFIGURATION=true
    volumes:
      - ./slskd-data:/app
      - /mnt/data/slskd/downloads:/app/downloads
    ports:
      - "5030:5030"
